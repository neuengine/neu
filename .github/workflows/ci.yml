# Continuous integration for the Neu engine (Track E / T-6E01, T-6E02).
# Gates: build + vet + coverage across the OS matrix, the C28 race detector,
# golangci-lint, and the benchmark drift gate wired to cmd/benchcompare.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

env:
  # Minimum supported Go toolchain — must track pkg/version.MinGoToolchain.
  GO_VERSION: "1.26.3"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (coverage)
        run: go test -coverprofile=coverage.out ./...

  race:
    # C28 race gate: hosted runners ship a C toolchain, so CGO/-race works here
    # even though it is unavailable in the dep-free local dev environment (C-005).
    name: race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test -race
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  bench:
    # Benchmark drift gate (T-6E02) — pipes `go test -bench` through cmd/benchcompare.
    # Advisory for now: the committed bench/baseline.json captures ns/op from a dev
    # machine, which differs from hosted runners; allocs/op and B/op are the
    # machine-independent signals. Regenerate the baseline on a dedicated runner to
    # make ns/op gating blocking.
    name: benchmark drift gate
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Compare benchmarks to baseline
        run: go test -run='^$' -bench=. -benchmem ./... | go run ./cmd/benchcompare -threshold 25
